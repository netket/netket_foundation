<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" width="480" height="360">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4f8ef7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4f8ef7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="480" height="360" fill="url(#bg)" rx="12"/>

  <!-- Glow blobs -->
  <ellipse cx="160" cy="180" rx="140" ry="140" fill="url(#glow1)"/>
  <ellipse cx="340" cy="160" rx="120" ry="120" fill="url(#glow2)"/>

  <!-- Grid of nodes (quantum lattice) -->
  <g stroke="#4f8ef7" stroke-opacity="0.25" stroke-width="1">
    <!-- horizontal lines -->
    <line x1="80"  y1="100" x2="400" y2="100"/>
    <line x1="80"  y1="160" x2="400" y2="160"/>
    <line x1="80"  y1="220" x2="400" y2="220"/>
    <line x1="80"  y1="280" x2="400" y2="280"/>
    <!-- vertical lines -->
    <line x1="80"  y1="100" x2="80"  y2="280"/>
    <line x1="160" y1="100" x2="160" y2="280"/>
    <line x1="240" y1="100" x2="240" y2="280"/>
    <line x1="320" y1="100" x2="320" y2="280"/>
    <line x1="400" y1="100" x2="400" y2="280"/>
  </g>

  <!-- Neural-net style arcs connecting nodes -->
  <g fill="none" stroke-width="1.5" stroke-opacity="0.5">
    <path d="M80,160 Q160,100 240,160" stroke="#4f8ef7"/>
    <path d="M160,220 Q240,160 320,220" stroke="#a855f7"/>
    <path d="M240,160 Q320,220 400,160" stroke="#4f8ef7"/>
    <path d="M80,220 Q200,280 320,160" stroke="#a855f7" stroke-opacity="0.3"/>
    <path d="M160,160 Q280,100 400,220" stroke="#4f8ef7" stroke-opacity="0.3"/>
  </g>

  <!-- Lattice nodes -->
  <g fill="#4f8ef7">
    <circle cx="80"  cy="100" r="5"/>
    <circle cx="160" cy="100" r="5"/>
    <circle cx="240" cy="100" r="5"/>
    <circle cx="320" cy="100" r="5"/>
    <circle cx="400" cy="100" r="5"/>
    <circle cx="80"  cy="160" r="5"/>
    <circle cx="160" cy="160" r="7" fill="#a855f7"/>
    <circle cx="240" cy="160" r="9" fill="#4f8ef7" fill-opacity="0.9"/>
    <circle cx="320" cy="160" r="7" fill="#a855f7"/>
    <circle cx="400" cy="160" r="5"/>
    <circle cx="80"  cy="220" r="5"/>
    <circle cx="160" cy="220" r="5"/>
    <circle cx="240" cy="220" r="5"/>
    <circle cx="320" cy="220" r="5"/>
    <circle cx="400" cy="220" r="5"/>
    <circle cx="80"  cy="280" r="5"/>
    <circle cx="160" cy="280" r="5"/>
    <circle cx="240" cy="280" r="5"/>
    <circle cx="320" cy="280" r="5"/>
    <circle cx="400" cy="280" r="5"/>
  </g>

  <!-- Central highlight ring -->
  <circle cx="240" cy="160" r="20" fill="none" stroke="#4f8ef7" stroke-width="1.5" stroke-opacity="0.6"/>
  <circle cx="240" cy="160" r="32" fill="none" stroke="#4f8ef7" stroke-width="0.8" stroke-opacity="0.3"/>
</svg>
